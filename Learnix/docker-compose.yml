# Merge with repo root: docker compose -f docker-compose.yml -f Learnix/docker-compose.yml up -d
#
# Joins `web` to external `proxy-net` for nginx-proxy (stable name `learnix-web` is set in root compose).
# Create the network once: docker network create proxy-net

networks:
  proxy-net:
    external: true

services:
  web:
    networks:
      - default
      - proxy-net
